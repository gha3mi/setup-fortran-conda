name: Setup Fortran with Conda
description: Installs Fortran compilers and extra packages using Conda or vendor packages. Optionally builds docs and updates README status/dependency graphs.
author: Seyed Ali Ghasemi
branding:
  icon: 'check'
  color: 'purple'

inputs:
  compiler:
    description: "Fortran compiler to install (gfortran, ifx, lfortran, flang, flang-new, nvfortran, aocc, aomp, mpifort)"
    required: false
    default: ""
  compiler-version:
    description: "compiler version"
    required: false
    default: ""
  platform:
    description: "Runner OS platform (ubuntu-latest, windows-latest, macos-latest)"
    required: false
    default: ""
  extra-packages:
    description: "List of additional Conda packages (e.g., cmake ninja)"
    required: false
    default: ""
  fpm-version:
    description: "fpm version to install. Empty means latest."
    required: false
    default: ""
  checkout-repo:
    description: "Whether to checkout the repository before setup"
    required: false
    default: "true"

  generate-doc-ford:
    description: "Whether to build and deploy FORD documentation"
    required: false
    default: "false"
  ford-config:
    description: "Path to FORD config file (e.g., README.md or ford.md)"
    required: false
    default: "README.md"
  ford-branch:
    description: "Branch to deploy FORD docs to"
    required: false
    default: "gh-pages-ford"
  ford-working-directory:
    description: "Directory to run FORD from (relative to root)"
    required: false
    default: "."
  ford-output-directory:
    description: "Path to generated FORD documentation (used by deployment)"
    required: false
    default: "doc/ford"
  ford-target-folder:
    description: "Target folder in repo for deployed FORD docs (used only if branch is main or master)"
    required: false
    default: "doc/ford"

  generate-doc-doxygen:
    description: "Whether to build and deploy Doxygen documentation"
    required: false
    default: "false"
  doxygen-config:
    description: "Path to Doxygen config file (e.g., Doxyfile)"
    required: false
    default: "Doxyfile"
  doxygen-branch:
    description: "Branch to deploy Doxygen docs to"
    required: false
    default: "gh-pages-doxygen"
  doxygen-working-directory:
    description: "Directory to run Doxygen from (relative to root)"
    required: false
    default: "."
  doxygen-output-directory:
    description: "Path to generated Doxygen documentation (used by deployment)"
    required: false
    default: "doc/doxygen"
  doxygen-target-folder:
    description: "Target folder in repo for deployed Doxygen docs (used only if branch is main or master)"
    required: false
    default: "doc/doxygen"

  generate-status-fpm:
    description: 'Generate STATUS.md for test_fpm jobs'
    required: false
    default: 'false'

  generate-status-cmake:
    description: 'Generate STATUS.md for test_cmake jobs'
    required: false
    default: 'false'

  generate-status-meson:
    description: 'Generate STATUS.md for test_meson jobs'
    required: false
    default: 'false'

  generate-status-table:
    description: "Generate and inject CI status table into README.md"
    required: false
    default: "false"

  update-readme-table:
    description: "Whether to auto-update the status table in README.md and commit it"
    required: false
    default: "false"
  update-readme-user-name:
    description: "Git user.name for README.md update commit"
    required: false
  update-readme-user-email:
    description: "Git user.email for README.md update commit"
    required: false
  update-readme-token:
    description: "GitHub token used to create README update PRs"
    required: false

  update-readme-dependencies:
    description: "Generate and inject one fpm dependency graph into README.md. Supported values: false, fpm-deps, fpm-modules"
    required: false
    default: "false"
  dependency-graph-working-directory:
    description: "Directory containing fpm.toml for README dependency graph generation"
    required: false
    default: "."
  dependency-graph-readme-file:
    description: "README file to update with the dependency graph"
    required: false
    default: "README.md"
  dependency-graph-options:
    description: "Extra one-line CLI options passed to the selected dependency graph tool"
    required: false
    default: ""

  fortitude-check:
    description: "Run Fortitude check (https://github.com/PlasmaFAIR/fortitude)"
    required: false
    default: "false"
  fortitude-settings:
    description: "Extra flags for 'fortitude check'"
    required: false
    default: "--output-format github"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      if: ${{ inputs.checkout-repo == 'true' || inputs.generate-doc-ford == 'true' || inputs.generate-doc-doxygen == 'true' }}
      uses: actions/checkout@v6.0.3

    - name: Validate README update mode
      if: ${{ inputs.update-readme-table == 'true' && inputs.update-readme-dependencies != 'false' }}
      shell: bash
      run: |
        echo "::error::Use separate jobs for update-readme-table and update-readme-dependencies."
        exit 1

    - name: Validate README dependency graph tool
      if: ${{ inputs.update-readme-dependencies != 'false' && inputs.update-readme-dependencies != 'fpm-deps' && inputs.update-readme-dependencies != 'fpm-modules' }}
      shell: bash
      run: |
        echo "::error::update-readme-dependencies must be false, fpm-deps, or fpm-modules."
        exit 1

    - name: Validate README dependency graph platform
      if: ${{ inputs.update-readme-dependencies != 'false' && runner.os != 'Linux' }}
      shell: bash
      run: |
        echo "::error::README dependency graph generation currently supports Linux runners only."
        exit 1

    - name: Setup Miniconda
      if: >-
        ${{
          inputs.compiler != '' ||
          inputs.generate-doc-ford == 'true' ||
          inputs.generate-doc-doxygen == 'true' ||
          inputs.update-readme-dependencies != 'false' ||
          inputs.fortitude-check == 'true'
        }}
      uses: conda-incubator/setup-miniconda@v4.0.1
      with:
        auto-update-conda: true
        activate-environment: fortran
        channels: conda-forge, defaults

    - name: Run Fortran compiler setup script
      id: setup_fortran
      if: ${{ inputs.compiler != '' || inputs.update-readme-dependencies != 'false' }}
      shell: bash
      run: node "${{ github.action_path }}/index.js"
      env:
        INPUT_COMPILER: ${{ inputs.compiler != '' && inputs.compiler || 'gfortran' }}
        INPUT_COMPILER_VERSION: ${{ inputs.compiler-version }}
        INPUT_PLATFORM: ${{ inputs.platform != '' && inputs.platform || runner.os }}
        INPUT_EXTRA_PACKAGES: ${{ inputs.extra-packages }}
        INPUT_FPM_VERSION: ${{ inputs.fpm-version }}
        GITHUB_TOKEN: ${{ github.token }}

    - name: Upload setup-fortran-conda metadata
      if: >-
        ${{
          always() &&
          inputs.compiler != '' &&
          inputs.fortitude-check != 'true' &&
          inputs.generate-doc-ford != 'true' &&
          inputs.generate-doc-doxygen != 'true' &&
          inputs.update-readme-dependencies == 'false' &&
          inputs.generate-status-table != 'true' &&
          inputs.update-readme-table != 'true'
        }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.setup_fortran.outputs.metadata-artifact-name }}
        path: ${{ steps.setup_fortran.outputs.metadata-path }}

    - name: Install and Run Fortitude Linter
      if: ${{ inputs.fortitude-check == 'true' }}
      shell: bash
      run: |
        source "${CONDA}/etc/profile.d/conda.sh"
        conda activate fortran

        echo "::group:: setup-fortran-conda: Install Fortitude"
        pip install fortitude-lint || {
          status=$?
          echo "::endgroup::"
          exit $status
        }
        echo "::endgroup::"

        fortitude check ${{ inputs.fortitude-settings }}

    - name: Build FORD documentation
      if: ${{ inputs.generate-doc-ford == 'true' }}
      shell: bash
      run: |
        source "${CONDA}/etc/profile.d/conda.sh"
        conda activate fortran

        echo "::group:: setup-fortran-conda: Prepare FORD Docs"
        conda install -y pip graphviz
        pip install ford
        mkdir -p "${{ inputs.ford-output-directory }}"
        cd "${{ inputs.ford-working-directory }}"
        echo "::endgroup::"

        echo "::group:: setup-fortran-conda: Build FORD Docs"
        ford "${{ inputs.ford-config }}"
        echo "::endgroup::"

    - name: Deploy FORD documentation
      if: ${{ inputs.generate-doc-ford == 'true' }}
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        branch: ${{ inputs.ford-branch }}
        folder: ${{ inputs.ford-output-directory }}
        target-folder: ${{ inputs.ford-target-folder }}
        clean: ${{ !contains('main master', inputs.ford-branch) }}
        commit-message: "Deploy FORD docs"

    - name: Build Doxygen documentation
      if: ${{ inputs.generate-doc-doxygen == 'true' }}
      shell: bash
      run: |
        source "${CONDA}/etc/profile.d/conda.sh"
        conda activate fortran

        echo "::group:: setup-fortran-conda: Prepare Doxygen Docs"
        conda install -y graphviz doxygen
        mkdir -p "${{ inputs.doxygen-output-directory }}"
        cd "${{ inputs.doxygen-working-directory }}"
        echo "::endgroup::"

        echo "::group:: setup-fortran-conda: Build Doxygen Docs"
        doxygen "${{ inputs.doxygen-config }}"
        echo "::endgroup::"

    - name: Deploy Doxygen documentation
      if: ${{ inputs.generate-doc-doxygen == 'true' }}
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        branch: ${{ inputs.doxygen-branch }}
        folder: ${{ inputs.doxygen-output-directory }}
        target-folder: ${{ inputs.doxygen-target-folder }}
        clean: ${{ !contains('main master', inputs.doxygen-branch) }}
        commit-message: "Deploy Doxygen docs"

    - name: Generate STATUS.md for test_fpm
      if: ${{ inputs.generate-status-fpm == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: |
        echo "::group:: setup-fortran-conda: Generate FPM Status"
        bash "${{ github.action_path }}/scripts/generate-status-fpm.sh"
        echo "::endgroup::"

    - name: Deploy STATUS.md (test_fpm)
      if: ${{ inputs.generate-status-fpm == 'true' }}
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        branch: status-fpm
        folder: status-fpm
        clean: true
        commit-message: "Deploy fpm status"

    - name: Generate STATUS.md for test_cmake
      if: ${{ inputs.generate-status-cmake == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: |
        echo "::group:: setup-fortran-conda: Generate CMake Status"
        bash "${{ github.action_path }}/scripts/generate-status-cmake.sh"
        echo "::endgroup::"

    - name: Deploy STATUS.md (test_cmake)
      if: ${{ inputs.generate-status-cmake == 'true' }}
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        branch: status-cmake
        folder: status-cmake
        clean: true
        commit-message: "Deploy cmake status"

    - name: Generate STATUS.md for test_meson
      if: ${{ inputs.generate-status-meson == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: |
        echo "::group:: setup-fortran-conda: Generate Meson Status"
        bash "${{ github.action_path }}/scripts/generate-status-meson.sh"
        echo "::endgroup::"

    - name: Deploy STATUS.md (test_meson)
      if: ${{ inputs.generate-status-meson == 'true' }}
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        branch: status-meson
        folder: status-meson
        clean: true
        commit-message: "Deploy meson status"

    - name: Checkout repository (for README update)
      if: ${{ inputs.update-readme-table == 'true' || inputs.update-readme-dependencies != 'false' }}
      uses: actions/checkout@v6.0.3
      with:
        persist-credentials: false

    - name: Download setup-fortran-conda metadata artifacts
      if: ${{ inputs.generate-status-table == 'true' || inputs.update-readme-table == 'true' }}
      uses: actions/download-artifact@v8
      with:
        pattern: setup-fortran-conda-meta-*
        path: ${{ runner.temp }}/setup-fortran-conda-meta
        merge-multiple: true

    - name: Generate and Inject CI Matrix into README (metadata-based)
      if: ${{ inputs.generate-status-table == 'true' }}
      shell: bash
      run: |
        echo "::group:: setup-fortran-conda: Generate README Matrix"
        node "${{ github.action_path }}/scripts/update-readme-matrix-table.js"
        echo "::endgroup::"
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SETUP_FORTRAN_CONDA_META_DIR: ${{ runner.temp }}/setup-fortran-conda-meta
        README_FILE: README.md

    - name: Generate status table in README
      if: ${{ inputs.update-readme-table == 'true' }}
      shell: bash
      run: |
        echo "::group:: setup-fortran-conda: Update README Status"
        node "${{ github.action_path }}/scripts/update-readme-matrix-table.js"
        echo "::endgroup::"
      env:
        GITHUB_TOKEN: ${{ github.token }}
        SETUP_FORTRAN_CONDA_META_DIR: ${{ runner.temp }}/setup-fortran-conda-meta
        README_FILE: README.md

    - name: Generate fpm package dependency graph in README
      if: ${{ inputs.update-readme-dependencies == 'fpm-deps' }}
      shell: bash
      run: |
        source "${CONDA}/etc/profile.d/conda.sh"
        conda activate fortran

        echo "::group:: setup-fortran-conda: Update README fpm Dependency Graph"
        node "${{ github.action_path }}/scripts/update-readme-fpm-deps.js"
        echo "::endgroup::"
      env:
        DEPENDENCY_GRAPH_WORKING_DIRECTORY: ${{ inputs.dependency-graph-working-directory }}
        DEPENDENCY_GRAPH_README_FILE: ${{ inputs.dependency-graph-readme-file }}
        DEPENDENCY_GRAPH_OPTIONS: ${{ inputs.dependency-graph-options }}

    - name: Generate Fortran module dependency graph in README
      if: ${{ inputs.update-readme-dependencies == 'fpm-modules' }}
      shell: bash
      run: |
        source "${CONDA}/etc/profile.d/conda.sh"
        conda activate fortran

        echo "::group:: setup-fortran-conda: Update README Module Dependency Graph"
        node "${{ github.action_path }}/scripts/update-readme-fpm-modules.js"
        echo "::endgroup::"
      env:
        DEPENDENCY_GRAPH_WORKING_DIRECTORY: ${{ inputs.dependency-graph-working-directory }}
        DEPENDENCY_GRAPH_README_FILE: ${{ inputs.dependency-graph-readme-file }}
        DEPENDENCY_GRAPH_OPTIONS: ${{ inputs.dependency-graph-options }}

    - name: Setup Git author
      if: ${{ inputs.update-readme-table == 'true' || inputs.update-readme-dependencies != 'false' }}
      shell: bash
      run: |
        git config user.name "${{ inputs.update-readme-user-name }}"
        git config user.email "${{ inputs.update-readme-user-email }}"

    - name: Create Pull Request for README status table
      if: ${{ inputs.update-readme-table == 'true' }}
      uses: peter-evans/create-pull-request@v8.1.1
      with:
        token: "${{ inputs.update-readme-token }}"
        commit-message: "Update README.md status table [ci skip]"
        branch: update/readme-status-table
        title: "update README.md status table"
        body: "This PR updates the CI status table in the README.md."
        delete-branch: true

    - name: Create Pull Request for fpm dependency graph
      if: ${{ inputs.update-readme-dependencies == 'fpm-deps' }}
      uses: peter-evans/create-pull-request@v8.1.1
      with:
        token: "${{ inputs.update-readme-token }}"
        commit-message: "Update README.md fpm dependency graph [ci skip]"
        branch: update/readme-fpm-deps
        title: "update README.md fpm dependency graph"
        body: "This PR updates the fpm package dependency graph in the README.md."
        delete-branch: true

    - name: Create Pull Request for module dependency graph
      if: ${{ inputs.update-readme-dependencies == 'fpm-modules' }}
      uses: peter-evans/create-pull-request@v8.1.1
      with:
        token: "${{ inputs.update-readme-token }}"
        commit-message: "Update README.md module dependency graph [ci skip]"
        branch: update/readme-fpm-modules
        title: "update README.md module dependency graph"
        body: "This PR updates the Fortran module dependency graph in the README.md."
        delete-branch: true
